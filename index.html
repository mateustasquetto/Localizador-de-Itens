<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Itens | Compacto Otimizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        .spinner {
            border-top-color: #3b82f6;
            -webkit-animation: spin 1s ease-in-out infinite;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Definindo a variável CSS para o verde do título (text-green-400) e botão */
        :root {
            --green-title: #4ade80; 
        }
        .btn-green-custom {
            background-color: var(--green-title);
        }
        .btn-green-custom:hover {
            background-color: #22c55e;
        }
        /* Ajuste fino para inputs e selects mais confortáveis */
        .compact-input {
             /* p-2.5, um meio termo */
             padding: 0.625rem 0.75rem; 
        }
        .compact-button {
             /* py-2, um meio termo */
             padding-top: 0.5rem; 
             padding-bottom: 0.5rem;
             font-size: 0.875rem; /* text-sm */
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <div id="app" class="max-w-3xl mx-auto">
        
        <header class="flex items-center justify-between bg-[#3d3d3d] p-3 mb-4 rounded-lg shadow-xl border border-[#444]">
            <h1 class="text-base font-bold text-green-400 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg>
                Localizador de Itens
            </h1>
            <div>
                <img src="sr-sem-fundo.png" alt="Grupo SR Logo" class="h-7 md:h-8">
            </div>
        </header>

        <div class="bg-[#2e2e2e] p-6 rounded-xl shadow-lg border border-[#3d3d3d] mb-4">
            <h2 class="text-base font-semibold mb-4 text-gray-200 border-b border-[#3d3d3d] pb-2">Buscar Item</h2>
            
            <div class="mb-4">
                <label for="itemCode" class="block text-sm font-medium text-gray-400 mb-1">
                    Código do Item (COD ITEM)
                </label>
                <input type="text" id="itemCode" placeholder="Informe o código do item"
                        class="w-full compact-input border border-[#444] rounded-lg text-base font-mono focus:ring-blue-500 focus:border-blue-500 transition duration-150 uppercase bg-[#1f1f1f] text-white">
            </div>

            <button id="searchButton" onclick="searchItem()"
                    class="w-full btn-green-custom text-white font-bold compact-button px-4 rounded-lg shadow-md transition duration-300 ease-in-out flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg>
                Buscar
            </button>
        </div>
        
        <div id="clientFilterBlock" class="bg-[#2e2e2e] p-6 rounded-xl shadow-lg border border-[#3d3d3d] mb-4 hidden">
            <h2 class="text-base font-semibold mb-2 text-gray-200">Filtrar por Pedido</h2>
            <label for="clientSelect" class="block text-sm font-medium text-gray-400 mb-1">
                Selecione o Pedido (com nome do Cliente)
            </label>
            <select id="clientSelect" onchange="filterResultsByClient(this.value)"
                    class="w-full compact-input border border-[#444] rounded-lg text-base font-medium focus:ring-blue-500 focus:border-blue-500 transition duration-150 bg-[#1f1f1f] text-white appearance-none pr-10">
                </select>
        </div>

        <div id="resultsBlock" class="bg-[#242424] p-6 rounded-xl shadow-xl border border-[#333] hidden">
            <h2 class="text-base font-semibold mb-4 text-gray-200 border-b border-[#3d3d3d] pb-2">Itens do Carregamento</h2>
            
            <div id="results" class="flex flex-col items-center justify-center gap-2 p-2">
                </div>

            <div id="urlSection" class="hidden">
                <code id="testUrlCode"></code>
                <p id="copyConfirmation"></p>
            </div>
        </div>
    </div>
    
    <script>
        // Variável global para armazenar TODOS os itens retornados pela API
        let allFetchedItems = [];

        // Elementos DOM
        const codeInput = document.getElementById('itemCode');
        const resultsDiv = document.getElementById('results');
        const searchButton = document.getElementById('searchButton');
        const clientSelect = document.getElementById('clientSelect');
        const clientFilterBlock = document.getElementById('clientFilterBlock');
        const resultsBlock = document.getElementById('resultsBlock'); 

        // ORDEM FINAL E CORRETA DAS CHAVES NO CARD (COM "PEDIDO" REMOVIDO)
        const DISPLAY_ORDER = [
            "CARREGAMENTO", 
            "CODIGO VOL", 
            "COD ITEM", 
            "DESC TECNICA", 
            "QTDE"
        ];
        
        // --- Funções Auxiliares (Lógica de Busca e Filtro Inalterada) ---

        async function searchItem() {
            // ... (Lógica de busca inalterada) ...
            clientFilterBlock.classList.add('hidden');
            resultsBlock.classList.add('hidden');
            allFetchedItems = [];
            
            searchButton.disabled = true;
            // Mantendo h-4/w-4 no spinner
            searchButton.innerHTML = `<div class="spinner border-4 border-[#333] border-t-4 h-4 w-4 rounded-full mr-2"></div> Buscando...`;
            
            const appsScriptUrl = "https://script.google.com/macros/s/AKfycbzfjKdYKPkY-HsqB3uxySAQMTUPYrhNby6qjybXWaUgI4TWlwhjC9MNXWT4f9ETL84O/exec"; 
            const itemCode = codeInput.value.trim().toUpperCase();

            if (!appsScriptUrl || !itemCode) {
                displayError("Por favor, informe o Código do Item para buscar.");
                searchButton.disabled = false;
                return;
            }

            const baseUrl = appsScriptUrl.endsWith('/exec') ? appsScriptUrl : appsScriptUrl.split('?')[0];
            const fullUrl = `${baseUrl}?query=${encodeURIComponent(itemCode)}`;

            try {
                const response = await fetch(fullUrl);
                
                if (!response.ok && response.status !== 200) {
                     throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                if (Array.isArray(data) && data.length > 0) {
                    allFetchedItems = data;
                    setupClientFilter(data);
                    
                    clientFilterBlock.classList.remove('hidden'); 
                    
                    resultsBlock.classList.add('hidden'); 
                    resultsDiv.innerHTML = "";
                    
                } else if (data.error) {
                    displayError(data.error);
                } else {
                    displayError("A resposta da API não retornou itens válidos.");
                }

            } catch (error) {
                console.error("Erro na requisição fetch:", error);
                displayError(`Erro de Conexão ou Requisição. Detalhes: ${error.message}. Verifique a URL e a Implantação.`);
            } finally {
                searchButton.disabled = false;
                searchButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg> Buscar`;
            }
        }
        
        function setupClientFilter(items) {
            // ... (Lógica de filtro inalterada) ...
            const uniqueClientsMap = {};
            
            items.forEach(item => {
                const displayText = `${item.PEDIDO} (${item.CLIENTE})`; 
                const valueKey = item.PEDIDO;
                uniqueClientsMap[valueKey] = displayText;
            });

            const uniqueClientsValues = Object.keys(uniqueClientsMap).sort();
            
            clientSelect.innerHTML = '';
            
            if (uniqueClientsValues.length === 0) {
                 clientFilterBlock.classList.add('hidden');
                 return;
            }

            const defaultOption = document.createElement('option');
            defaultOption.value = ""; 
            defaultOption.textContent = "--- Selecione o Pedido/Cliente ---";
            clientSelect.appendChild(defaultOption);

            uniqueClientsValues.forEach(valueKey => {
                const option = document.createElement('option');
                option.value = valueKey;
                option.textContent = uniqueClientsMap[valueKey]; 
                clientSelect.appendChild(option);
            });
            
            clientSelect.selectedIndex = 0; 
            resultsBlock.classList.add('hidden'); 
            resultsDiv.innerHTML = "";
        }
        
        function filterResultsByClient(selectedClientValue) {
            // ... (Lógica de filtragem inalterada) ...
            const filterValue = String(selectedClientValue || '').trim().toUpperCase();

            if (!filterValue || allFetchedItems.length === 0) {
                 displayAwaitingSelection("Selecione um Pedido para visualizar os itens.");
                 return;
            }
            
            const filteredItems = allFetchedItems.filter(item => {
                const itemPedido = String(item.PEDIDO || '').trim().toUpperCase();
                return itemPedido === filterValue;
            });
            
            if (filteredItems.length > 0) {
                resultsBlock.classList.remove('hidden');
                displaySuccess(filteredItems);
            } else {
                resultsBlock.classList.add('hidden');
                displayError(`A filtragem para o Pedido/Cliente selecionado (${selectedClientValue}) não encontrou itens. Isto pode ser um erro de comparação de dados.`);
            }
        }

        /**
         * Exibe a mensagem de aguardando seleção. (Revertendo para p-3)
         */
        function displayAwaitingSelection(message) {
            resultsDiv.classList.remove('border-green-600', 'border-red-600', 'border-2', 'bg-transparent');
            
            // p-3 e fonte text-sm
            resultsDiv.classList.add('flex', 'flex-col', 'items-center', 'justify-center', 'p-3', 'rounded-lg', 'border', 'border-dashed', 'border-[#444]', 'bg-[#1a1a1a]');
            
            resultsDiv.innerHTML = `<p class="text-sm text-gray-500 italic text-center" id="initialMessage">${message}</p>`;
            
            resultsBlock.classList.add('hidden'); 
        }

        /**
         * Exibe uma LISTA de itens encontrados no formato de Cartão. (Ajuste leve nos cards)
         */
        function displaySuccess(items) {
            resultsDiv.classList.remove('flex', 'items-center', 'justify-center', 'border-dashed', 'border-[#444]', 'bg-[#1a1a1a]');
            resultsDiv.classList.add('border-green-600', 'border-2', 'p-3', 'bg-transparent'); // p-3 para o container
            
            let htmlContent = '';
            
            items.forEach(item => {
                let cardContent = '';
                let validContentFoundInCard = false; 
                
                DISPLAY_ORDER.forEach(key => {
                    if (item.hasOwnProperty(key)) {
                        const value = item[key]; 
                        
                        // Revertendo mb-0.5 para mb-1, e text-sm no valor
                        cardContent += `
                            <div class="flex flex-col mb-1">
                                <span class="text-xs font-medium uppercase text-gray-400">${key.toUpperCase()}:</span>
                                <span class="text-sm text-white font-medium break-words">${value}</span>
                            </div>
                        `;
                        
                        if (value !== null && value !== undefined && String(value).trim() !== "") {
                            validContentFoundInCard = true;
                        }
                    }
                });
                
                if (validContentFoundInCard) {
                    // Revertendo p-1 para p-2 no card, e mb-1 para mb-2
                    htmlContent += `
                        <div class="bg-[#1a1a1a] rounded-lg shadow-xl p-2 border border-[#333] w-full mb-2">
                            <div class="p-1 text-white">
                                ${cardContent}
                            </div>
                        </div>
                    `;
                }
            });
            
            if (htmlContent === '') {
                resultsBlock.classList.add('hidden');
                displayError("Nenhum item com dados para exibição encontrado. O item foi filtrado, mas os campos estão vazios.");
            } else {
                resultsDiv.innerHTML = htmlContent;
            }
        }

        function displayError(message) {
            resultsBlock.classList.remove('hidden');
            
            resultsDiv.classList.remove('flex', 'flex-col', 'items-center', 'justify-center', 'border-dashed', 'border-green-600', 'bg-transparent');
            // Revertendo p-2 para p-3
            resultsDiv.classList.add('p-3', 'rounded-lg', 'border-red-600', 'border-2', 'bg-[#1a1a1a]');
            resultsDiv.innerHTML = `
                <div class="text-center">
                    <p class="text-base font-bold text-red-500 mb-2">❌ Erro na Busca:</p>
                    <p class="text-gray-400 break-words text-sm">${message}</p>
                    <p class="text-xs text-red-400 mt-2">Verifique os logs do Apps Script (apenas se a URL ou a sheet estiver errada).</p>
                </div>
            `;
        }

        // Inicializa a tela de resultados
        document.addEventListener('DOMContentLoaded', initializeResults);
        
        function initializeResults() {
             displayAwaitingSelection("Aguardando código para iniciar a busca.");
             clientFilterBlock.classList.add('hidden');
        }
    </script>
</body>
</html>
