<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Itens | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        .spinner {
            border-top-color: #3b82f6;
            -webkit-animation: spin 1s ease-in-out infinite;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Definindo a variável CSS para o verde do título (text-green-400) e botão */
        :root {
            --green-title: #4ade80; 
        }
        .btn-green-custom {
            background-color: var(--green-title);
        }
        .btn-green-custom:hover {
            background-color: #22c55e; /* Um verde um pouco mais escuro para o hover */
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="app" class="max-w-3xl mx-auto">
        
        <header class="flex items-center justify-between bg-[#242424] p-4 mb-8 rounded-lg shadow-xl border border-[#333]">
            <h1 class="text-xl font-bold text-green-400 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg>
                Localizador de Itens
            </h1>
            <div>
                <img src="sr-sem-fundo.png" alt="Grupo SR Logo" class="h-8 md:h-10">
            </div>
        </header>

        <div class="bg-[#2e2e2e] p-6 md:p-8 rounded-xl shadow-lg border border-[#3d3d3d] mb-8">
            <h2 class="text-lg font-semibold mb-6 text-gray-200 border-b border-[#3d3d3d] pb-3">Buscar Item</h2>
            
            <div class="mb-6">
                <label for="itemCode" class="block text-sm font-medium text-gray-400 mb-2">
                    Código do Item (COD ITEM)
                </label>
                <input type="text" id="itemCode" placeholder="Informe o código do item"
                        class="w-full p-3 border border-[#444] rounded-lg text-lg font-mono focus:ring-blue-500 focus:border-blue-500 transition duration-150 uppercase bg-[#1f1f1f] text-white">
            </div>

            <button id="searchButton" onclick="searchItem()"
                    class="w-full btn-green-custom text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-300 ease-in-out flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg>
                Buscar
            </button>
        </div>

        <div class="bg-[#242424] p-6 md:p-8 rounded-xl shadow-xl border border-[#333]">
            <h2 class="text-lg font-semibold mb-6 text-gray-200 border-b border-[#3d3d3d] pb-3">Itens do Carregamento</h2>
            
            <div id="results" class="min-h-[150px] flex flex-col items-center justify-center gap-2 p-4 rounded-lg border border-dashed border-[#444] bg-[#1a1a1a]">
                <p class="text-gray-500 italic text-center" id="initialMessage">
                    Aguardando código para iniciar a busca.
                </p>
            </div>

            <div id="urlSection" class="hidden">
                <code id="testUrlCode"></code>
                <p id="copyConfirmation"></p>
            </div>
        </div>
    </div>
    
    <script>
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                return true;
            } catch (err) {
                console.error('Falha ao copiar:', err);
                return false;
            } finally {
                document.body.removeChild(textarea);
            }
        }

        const codeInput = document.getElementById('itemCode');
        const resultsDiv = document.getElementById('results');
        const initialMessage = document.getElementById('initialMessage');
        const searchButton = document.getElementById('searchButton');
        const urlSection = document.getElementById('urlSection');
        const testUrlCode = document.getElementById('testUrlCode');
        const copyConfirmation = document.getElementById('copyConfirmation');

        // Ordem desejada das chaves no cartão de resultado
        const DISPLAY_ORDER = [
            "PEDIDO", 
            "CARREGAMENTO", 
            "CODIGO VOL", 
            "COD ITEM", 
            "DESC TECNICA", 
            "QTDE"
        ];

        async function searchItem() {
            // Lembre-se de verificar e substituir este URL
            const appsScriptUrl = "https://script.google.com/macros/s/AKfycbzfjKdYKPkY-HsqB3uxySAQMTUPYrhNby6qjybXWaUgI4TWlwhjC9MNXWT4f9ETL84O/exec"; 
            const itemCode = codeInput.value.trim().toUpperCase();

            if (!appsScriptUrl || !itemCode) {
                displayError("Erro de configuração: A URL do Web Service ou o Código do Item está ausente.");
                return;
            }

            const baseUrl = appsScriptUrl.endsWith('/exec') ? appsScriptUrl : appsScriptUrl.split('?')[0];
            const fullUrl = `${baseUrl}?query=${encodeURIComponent(itemCode)}`;

            searchButton.disabled = true;
            searchButton.innerHTML = `<div class="spinner border-4 border-[#333] border-t-4 h-5 w-5 rounded-full mr-2"></div> Buscando...`;
            displayLoading();

            try {
                const response = await fetch(fullUrl);
                
                if (!response.ok && response.status !== 200) {
                     throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                if (Array.isArray(data)) {
                    if (data.length > 0) {
                        displaySuccess(data);
                    } else {
                        displayError(`Nenhum item encontrado para: ${itemCode}`);
                    }
                } else if (data.error) {
                    displayError(data.error);
                } else {
                    displaySuccess([data]);
                }

            } catch (error) {
                console.error("Erro na requisição fetch:", error);
                displayError(`Erro de Conexão ou Requisição. Detalhes: ${error.message}`);
            } finally {
                searchButton.disabled = false;
                searchButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg> Buscar`;
            }
        }

        function displayLoading() {
            initialMessage.classList.add('hidden');
            resultsDiv.innerHTML = `
                <div class="flex flex-col items-center p-8 text-center text-blue-400">
                    <div class="spinner border-4 border-[#3d3d3d] border-t-4 h-8 w-8 rounded-full mb-3"></div>
                    <p class="font-semibold text-lg">Buscando dados...</p>
                    <p class="text-sm text-gray-500 mt-1">Aguarde o carregamento do Google Apps Script.</p>
                </div>
            `;
            resultsDiv.classList.add('min-h-[150px]', 'flex', 'flex-col', 'items-center', 'justify-center', 'p-4', 'rounded-lg', 'border', 'border-dashed', 'border-[#444]', 'bg-[#1a1a1a]');
            resultsDiv.classList.remove('border-green-600', 'border-red-600');
        }

        function displaySuccess(items) {
            initialMessage.classList.add('hidden');
            
            resultsDiv.classList.remove('flex', 'items-center', 'justify-center', 'border-dashed', 'border-[#444]', 'bg-[#1a1a1a]');
            
            resultsDiv.classList.add('border-green-600', 'border-2', 'p-4', 'bg-transparent'); 
            
            let htmlContent = '';

            items.forEach(item => {
                htmlContent += `
                    <div class="bg-[#1a1a1a] rounded-lg shadow-xl p-3 border border-[#333] w-full mb-3">
                        <div class="p-2 text-white">
                `;

                // 1. Itera sobre a ordem desejada
                DISPLAY_ORDER.forEach(key => {
                    // 2. Verifica se a chave existe no item retornado
                    if (item.hasOwnProperty(key)) {
                        htmlContent += `
                            <div class="flex flex-col mb-2">
                                <span class="text-xs font-medium uppercase text-gray-400">${key.toUpperCase()}:</span>
                                <span class="text-base text-white font-medium break-words">${item[key]}</span>
                            </div>
                        `;
                        // Remove a chave do objeto para não ser iterada novamente
                        delete item[key];
                    }
                });
                
                // 3. Itera sobre chaves remanescentes 
                for (const key in item) {
                    if (item.hasOwnProperty(key)) {
                        htmlContent += `
                            <div class="flex flex-col mb-2">
                                <span class="text-xs font-medium uppercase text-gray-400">${key.toUpperCase()}:</span>
                                <span class="text-base text-white font-medium break-words">${item[key]}</span>
                            </div>
                        `;
                    }
                }
                
                htmlContent += `
                        </div>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = htmlContent;
        }

        function displayError(message) {
            initialMessage.classList.add('hidden');
            resultsDiv.classList.remove('flex', 'flex-col', 'items-center', 'justify-center', 'border-dashed', 'border-green-600', 'bg-transparent');
            resultsDiv.classList.add('p-4', 'rounded-lg', 'border-red-600', 'border-2', 'bg-[#1a1a1a]');
            resultsDiv.innerHTML = `
                <div class="text-center">
                    <p class="text-lg font-bold text-red-500 mb-2">❌ Erro na Busca:</p>
                    <p class="text-gray-400 break-words">${message}</p>
                    <p class="text-sm text-red-400 mt-3">Verifique os logs do Apps Script.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
